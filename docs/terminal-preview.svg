<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 720" fill="none">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
    .t { font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 12.5px; }
    .bold { font-weight: 700; }
    .green { fill: #4ade80; }
    .green-dark { fill: #22c55e; }
    .cyan { fill: #2dd4bf; }
    .purple { fill: #a78bfa; }
    .blue { fill: #60a5fa; }
    .yellow { fill: #fbbf24; }
    .white { fill: #f4f4f5; }
    .dim { fill: #52525b; }
    .gray { fill: #71717a; }
    .g1 { fill: #00af00; }
    .g3 { fill: #00d75f; }
    .g5 { fill: #00ff87; }
    .g6 { fill: #00ffaf; }
    .g7 { fill: #00af87; }
    .g9 { fill: #5fd7d7; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .cursor { animation: blink 1s step-end infinite; }
  </style>

  <!-- Window -->
  <rect width="820" height="720" rx="12" fill="#0d1117"/>
  <rect width="820" height="720" rx="12" stroke="#1e1e2e" stroke-width="1" fill="none"/>

  <!-- Title bar -->
  <rect width="820" height="44" rx="12" fill="#161b22"/>
  <rect y="32" width="820" height="12" fill="#161b22"/>
  <line x1="0" y1="44" x2="820" y2="44" stroke="#1e1e2e" stroke-width="1"/>
  <circle cx="20" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="22" r="6" fill="#febc2e"/>
  <circle cx="60" cy="22" r="6" fill="#28c840"/>
  <text x="410" y="26" text-anchor="middle" class="t gray" font-size="11">php vendor/reandimo/google-sheets-helper/firstauth</text>

  <!-- Terminal content — y starts at 72 with 17px line-height -->
  <g transform="translate(24, 72)">

    <!-- ASCII Art: SHEETS -->
    <text y="0" class="t">
      <tspan class="g1">  ███████╗</tspan><tspan class="g3">██╗  ██╗</tspan><tspan class="g5">███████╗</tspan><tspan class="g6">███████╗</tspan><tspan class="g7">████████╗</tspan><tspan class="g9">███████╗</tspan>
    </text>
    <text y="17" class="t">
      <tspan class="g1">  ██╔════╝</tspan><tspan class="g3">██║  ██║</tspan><tspan class="g5">██╔════╝</tspan><tspan class="g6">██╔════╝</tspan><tspan class="g7">╚══██╔══╝</tspan><tspan class="g9">██╔════╝</tspan>
    </text>
    <text y="34" class="t">
      <tspan class="g1">  ███████╗</tspan><tspan class="g3">███████║</tspan><tspan class="g5">█████╗  </tspan><tspan class="g6">█████╗  </tspan><tspan class="g7">   ██║   </tspan><tspan class="g9">███████╗</tspan>
    </text>
    <text y="51" class="t">
      <tspan class="g1">  ╚════██║</tspan><tspan class="g3">██╔══██║</tspan><tspan class="g5">██╔══╝  </tspan><tspan class="g6">██╔══╝  </tspan><tspan class="g7">   ██║   </tspan><tspan class="g9">╚════██║</tspan>
    </text>
    <text y="68" class="t">
      <tspan class="g1">  ███████║</tspan><tspan class="g3">██║  ██║</tspan><tspan class="g5">███████╗</tspan><tspan class="g6">███████╗</tspan><tspan class="g7">   ██║   </tspan><tspan class="g9">███████║</tspan>
    </text>
    <text y="85" class="t">
      <tspan class="g1">  ╚══════╝</tspan><tspan class="g3">╚═╝  ╚═╝</tspan><tspan class="g5">╚══════╝</tspan><tspan class="g6">╚══════╝</tspan><tspan class="g7">   ╚═╝   </tspan><tspan class="g9">╚══════╝</tspan>
    </text>

    <!-- Subtitle -->
    <text y="114" class="t">
      <tspan class="white bold">  Google Sheets Helper</tspan><tspan class="dim"> v1.2.0</tspan><tspan class="dim">  ─  </tspan><tspan class="purple">First Auth Setup</tspan>
    </text>
    <text y="131" class="t green-dark">  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>

    <!-- Info -->
    <text y="160" class="t">
      <tspan class="cyan">  ℹ </tspan><tspan class="dim">This wizard generates your </tspan><tspan class="yellow">token.json</tspan><tspan class="dim"> file for API authentication.</tspan>
    </text>
    <text y="177" class="t">
      <tspan class="cyan">  ℹ </tspan><tspan class="dim">You'll need your </tspan><tspan class="yellow">credentials.json</tspan><tspan class="dim"> from Google Cloud Console.</tspan>
    </text>

    <!-- Separator -->
    <text y="206" class="t dim">  ─────────────────────────────────────────────</text>

    <!-- Step 1 -->
    <text y="235" class="t">
      <tspan class="purple">  [1/3] </tspan><tspan class="white bold">Base path</tspan>
    </text>
    <text y="252" class="t dim">  Working directory for resolving relative paths.</text>

    <text y="281" class="t">
      <tspan class="blue">  › </tspan><tspan class="white">Base path </tspan><tspan class="dim">(~/my-project)</tspan><tspan class="blue"> › </tspan>
    </text>

    <text y="310" class="t">
      <tspan class="green">  ✔ </tspan><tspan class="white">Using: </tspan><tspan class="cyan">~/my-project/</tspan>
    </text>

    <!-- Separator -->
    <text y="339" class="t dim">  ─────────────────────────────────────────────</text>

    <!-- Step 2 -->
    <text y="368" class="t">
      <tspan class="purple">  [2/3] </tspan><tspan class="white bold">Credentials file</tspan>
    </text>
    <text y="385" class="t dim">  Path to your credentials.json (relative to base path).</text>

    <text y="414" class="t">
      <tspan class="blue">  › </tspan><tspan class="white">Credentials file </tspan><tspan class="dim">(credentials.json)</tspan><tspan class="blue"> › </tspan>
    </text>

    <text y="443" class="t">
      <tspan class="green">  ✔ </tspan><tspan class="white">Found: </tspan><tspan class="cyan">~/my-project/credentials.json</tspan>
    </text>

    <!-- Separator -->
    <text y="472" class="t dim">  ─────────────────────────────────────────────</text>

    <!-- Step 3 -->
    <text y="501" class="t">
      <tspan class="purple">  [3/3] </tspan><tspan class="white bold">Token destination</tspan>
    </text>
    <text y="518" class="t dim">  Where to save the generated token.json file.</text>

    <text y="547" class="t">
      <tspan class="blue">  › </tspan><tspan class="white">Token file </tspan><tspan class="dim">(token.json)</tspan><tspan class="blue"> › </tspan>
    </text>

    <text y="576" class="t">
      <tspan class="green">  ✔ </tspan><tspan class="white">Will save to: </tspan><tspan class="cyan">~/my-project/token.json</tspan>
    </text>

    <!-- Final box -->
    <text y="605" class="t dim">  ─────────────────────────────────────────────</text>

    <text y="630" class="t green-dark">  ┌─────────────────────────────────────────────┐</text>
    <text y="647" class="t"><tspan class="green-dark">  │</tspan><tspan class="white bold">          Authentication complete!          </tspan><tspan class="green-dark">│</tspan></text>
    <text y="664" class="t green-dark">  └─────────────────────────────────────────────┘</text>
  </g>
</svg>
